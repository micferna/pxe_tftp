---
- name: Install TFTP and PXE packages
  ansible.builtin.apt:
    name: "{{ pxe_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Ensure TFTP root exists
  ansible.builtin.file:
    path: "{{ tftp_root }}"
    state: directory
    owner: root
    group: root
    mode: "{{ tftp_dir_mode }}"

- name: Create TFTP subdirectories
  ansible.builtin.file:
    path: "{{ tftp_root }}/{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "{{ tftp_dir_mode }}"
  loop: "{{ pxe_tftp_dirs }}"

- name: Copy syslinux BIOS bootloader modules
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ tftp_root }}/{{ item.dest }}"
    remote_src: true
    owner: root
    group: root
    mode: "{{ tftp_file_mode }}"
  loop: "{{ pxe_bios_files }}"

- name: Download Debian and Ubuntu netboot installer files
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ tftp_root }}/{{ item.dest }}"
    checksum: "{{ item.checksum | default(omit, true) }}"
    owner: root
    group: root
    mode: "{{ tftp_file_mode }}"
  loop: "{{ pxe_installer_files }}"

- name: Download netboot.xyz bootloaders (universal boot menu)
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ tftp_root }}/{{ item.dest }}"
    owner: root
    group: root
    mode: "{{ tftp_file_mode }}"
  loop: "{{ pxe_netbootxyz_files }}"
  when: pxe_enable_netbootxyz | bool

- name: Configure the legacy BIOS (pxelinux) boot menu
  ansible.builtin.template:
    src: pxelinux.cfg.j2
    dest: "{{ tftp_root }}/pxelinux.cfg/default"
    owner: root
    group: root
    mode: "{{ tftp_file_mode }}"

- name: Generate per-machine BIOS boot configs for the fleet
  ansible.builtin.template:
    src: pxelinux-host.cfg.j2
    dest: "{{ tftp_root }}/pxelinux.cfg/01-{{ item.mac | lower | replace(':', '-') }}"
    owner: root
    group: root
    mode: "{{ tftp_file_mode }}"
  loop: "{{ pxe_fleet }}"
  loop_control:
    label: "{{ item.name }}"

- name: Generate the GRUB network boot image for UEFI clients
  ansible.builtin.command:
    cmd: "grub-mknetdir --net-directory={{ tftp_root }} --subdir=boot/grub"
    creates: "{{ tftp_root }}/boot/grub/x86_64-efi/core.efi"
  when: pxe_enable_uefi | bool

- name: Configure the UEFI (GRUB) boot menu
  ansible.builtin.template:
    src: grub.cfg.j2
    dest: "{{ tftp_root }}/{{ item }}/grub.cfg"
    owner: root
    group: root
    mode: "{{ tftp_file_mode }}"
  loop: "{{ ['boot/grub'] + (['grub'] if pxe_secureboot | bool else []) }}"
  when: pxe_enable_uefi | bool

- name: Generate per-machine UEFI boot configs for the fleet
  ansible.builtin.template:
    src: grub-host.cfg.j2
    dest: "{{ tftp_root }}/grub/host-{{ item.mac | lower }}.cfg"
    owner: root
    group: root
    mode: "{{ tftp_file_mode }}"
  loop: "{{ pxe_fleet }}"
  loop_control:
    label: "{{ item.name }}"
  when: pxe_enable_uefi | bool

- name: Build the GRUB image for UEFI HTTP Boot
  ansible.builtin.command:
    cmd: >-
      grub-mkimage -O x86_64-efi
      -o {{ tftp_root }}/{{ pxe_httpboot_image }}
      -p (http,{{ pxe_server_ip }})/boot/grub
      http net efinet tftp normal linux echo configfile search
      search_label search_fs_uuid search_fs_file part_gpt part_msdos fat ext2 chain
    creates: "{{ tftp_root }}/{{ pxe_httpboot_image }}"
  when: pxe_enable_http_boot | bool

- name: Install Secure Boot signed bootloaders
  ansible.builtin.apt:
    name: "{{ pxe_secureboot_packages }}"
    state: present
  when: pxe_secureboot | bool

- name: Publish the signed shim and GRUB bootloaders
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ tftp_root }}/{{ item.dest }}"
    remote_src: true
    owner: root
    group: root
    mode: "{{ tftp_file_mode }}"
  loop: "{{ pxe_secureboot_files }}"
  when: pxe_secureboot | bool

- name: Configure the tftpd-hpa daemon
  ansible.builtin.template:
    src: tftpd-hpa.j2
    dest: /etc/default/tftpd-hpa
    owner: root
    group: root
    mode: "0644"
  notify: Restart tftpd-hpa

- name: Ensure tftpd-hpa is enabled and running
  ansible.builtin.systemd:
    name: tftpd-hpa
    enabled: true
    state: started
