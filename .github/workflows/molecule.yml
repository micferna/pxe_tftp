---
name: Molecule

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  molecule:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Molecule
        run: pip install ansible "molecule-plugins[docker]" molecule

      - name: Run the Molecule test suite
        run: molecule test
