---
name: Molecule

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  molecule:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Molecule
        run: pip install ansible "molecule-plugins[docker]" molecule

      - name: Run the Molecule test suite
        run: molecule test
