---
# ---------------------------------------------------------------------------
# Site configuration -- edit these values for your network before deploying.
# Technical defaults live in each role's defaults/main.yml.
# ---------------------------------------------------------------------------

# --- IPv4 DHCP scope ---
dhcp_domain_name: "test.lan"
dhcp_dns_servers: "1.1.1.1, 1.0.0.1"
dhcp_subnet_cidr: "192.168.1.0/24"
dhcp_range_start: "192.168.1.240"
dhcp_range_end: "192.168.1.250"
dhcp_routers: "192.168.1.1"

# --- IPv6 DHCP scope ---
# Example uses a Unique Local Address prefix (fd00::/8, RFC 4193).
# Replace with your own delegated prefix in production.
dhcp6_subnet: "fd00:abcd:1::"
dhcp6_prefix: "/64"
dhcp6_range_start: "fd00:abcd:1::10"
dhcp6_range_end: "fd00:abcd:1::100"
dhcp6_name_servers: "2606:4700:4700::1111"
dhcp6_domain_search: "test.lan"

# --- PXE server ---
# IP address clients use to reach this server (DHCP next-server / HTTP host).
pxe_server_ip: "192.168.1.14"

# Root directory served over TFTP and HTTP (shared by pxe_role and http_role).
tftp_root: /srv/tftp

# Boot filenames served per firmware type. Shared by dhcp_role (advertised
# over DHCP) and pxe_role (produced on disk) -- keep both in sync.
# For UEFI Secure Boot, set pxe_secureboot: true (pxe_role) and change
# pxe_bootfile_uefi to "bootx64.efi".
pxe_bootfile_bios: "pxelinux.0"
pxe_bootfile_uefi: "boot/grub/x86_64-efi/core.efi"

# --- Declarative fleet (per-machine provisioning) ---
# Each entry pins a known machine to a fixed IP and a boot profile.
# Kea gets a host reservation; the machine gets its own PXE boot config
# (pxelinux.cfg/01-<mac> and grub/host-<mac>.cfg).
#   os:          debian | ubuntu
#   autoinstall: true => unattended preseed install (requires
#                pxe_enable_autoinstall: true). Erases the disk.
pxe_fleet: []
# Example:
#   - name: web01
#     mac: "aa:bb:cc:dd:ee:01"
#     ip: "192.168.1.50"
#     os: debian
#     autoinstall: true

# --- Optional features ---
# Automated install via preseed. Erases the target disk without confirmation.
pxe_enable_autoinstall: false
# Universal boot menu: chainload netboot.xyz (huge catalogue of OSes + tools).
pxe_enable_netbootxyz: true
# UEFI HTTP Boot for HTTP-capable firmware. Validate on real hardware.
pxe_enable_http_boot: false
# Kea Control Agent (REST API) + a generated status web page.
pxe_enable_dashboard: false
