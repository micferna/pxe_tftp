---
- name: Determine whether the web server is needed
  ansible.builtin.set_fact:
    http_web_enabled: >-
      {{ (pxe_enable_autoinstall | bool)
         or (pxe_enable_http_boot | bool)
         or (pxe_enable_dashboard | bool) }}

- name: Provisioning web server
  when: http_web_enabled | bool
  block:
    - name: Install the provisioning web server
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: true
        cache_valid_time: 3600

    - name: Deploy the nginx site (serves the boot tree over HTTP)
      ansible.builtin.template:
        src: nginx-pxe.conf.j2
        dest: /etc/nginx/sites-available/pxe.conf
        owner: root
        group: root
        mode: "0644"
      notify: Reload nginx

    - name: Enable the PXE provisioning site
      ansible.builtin.file:
        src: /etc/nginx/sites-available/pxe.conf
        dest: /etc/nginx/sites-enabled/pxe.conf
        state: link
      notify: Reload nginx

    - name: Disable the default nginx site
      ansible.builtin.file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reload nginx

    - name: Ensure nginx is enabled and running
      ansible.builtin.systemd:
        name: nginx
        enabled: true
        state: started

- name: Generate preseed files for automated installs
  ansible.builtin.template:
    src: preseed.cfg.j2
    dest: "{{ tftp_root }}/preseed/preseed-{{ item.name }}.cfg"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ preseed_targets }}"
  loop_control:
    label: "{{ item.name }}"
  when: pxe_enable_autoinstall | bool

- name: Status dashboard
  when: pxe_enable_dashboard | bool
  block:
    - name: Install the Kea status page generator
      ansible.builtin.copy:
        src: kea-status
        dest: /usr/local/bin/kea-status
        owner: root
        group: root
        mode: "0755"

    - name: Install the status page systemd units
      ansible.builtin.template:
        src: "{{ item }}.j2"
        dest: "/etc/systemd/system/{{ item }}"
        owner: root
        group: root
        mode: "0644"
      loop:
        - kea-status.service
        - kea-status.timer

    - name: Enable the status page refresh timer
      ansible.builtin.systemd:
        name: kea-status.timer
        enabled: true
        state: started
        daemon_reload: true

    - name: Generate the status page now
      ansible.builtin.systemd:
        name: kea-status.service
        state: started
