---
# Default values for http_role.
# http_role serves the TFTP root (tftp_root) over HTTP. It only does something
# when at least one web feature is enabled: pxe_enable_autoinstall,
# pxe_enable_http_boot or pxe_enable_dashboard.

# Port the provisioning web server listens on.
http_listen_port: 80

# Automated-install (preseed) answers.
# SECURITY: preseed files are served over plain, unauthenticated HTTP. Anyone
# able to reach this server can read them -- do NOT store real secrets here,
# restrict the web server to your provisioning network, and change the
# credentials below (ideally via Ansible Vault).
preseed_hostname: "debian"
preseed_domain: "test.lan"
preseed_locale: "en_US.UTF-8"
preseed_keyboard: "fr"
preseed_timezone: "Europe/Paris"
preseed_username: "pxe"
preseed_user_fullname: "PXE User"
preseed_user_password: "changeme"

# Distributions a preseed file is generated for. Each produces the file
# preseed/preseed-<name>.cfg under the TFTP root.
preseed_targets:
  - name: debian
    mirror_hostname: deb.debian.org
    mirror_directory: /debian
  - name: ubuntu
    mirror_hostname: archive.ubuntu.com
    mirror_directory: /ubuntu

# How often the status dashboard page is regenerated.
dashboard_refresh: "1min"
