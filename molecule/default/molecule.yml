---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: pxe-debian12
    image: geerlingguy/docker-debian12-ansible:latest
    command: ""
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    groups:
      - pxe_servers
  - name: pxe-debian13
    image: geerlingguy/docker-debian13-ansible:latest
    command: ""
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    groups:
      - pxe_servers
provisioner:
  name: ansible
verifier:
  name: ansible
