---
- name: Verify
  hosts: pxe_servers
  become: true
  gather_facts: true
  tasks:
    - name: Validate the deployed Kea DHCPv4 configuration
      ansible.builtin.command: /usr/sbin/kea-dhcp4 -t /etc/kea/kea-dhcp4.conf
      changed_when: false

    - name: Collect service facts
      ansible.builtin.service_facts:

    - name: Assert core services are running
      ansible.builtin.assert:
        that:
          - ansible_facts.services[item ~ '.service'].state == 'running'
        fail_msg: "Service {{ item }} is not running"
      loop:
        - kea-dhcp4-server
        - kea-ctrl-agent
        - tftpd-hpa
        - nginx

    - name: Check that every expected boot artifact is published
      ansible.builtin.stat:
        path: "{{ tftp_root }}/{{ item }}"
      register: pxe_artifact
      failed_when: not pxe_artifact.stat.exists
      loop:
        - pxelinux.0
        - pxelinux.cfg/default
        - boot/grub/x86_64-efi/core.efi
        - boot/grub/grub.cfg
        - netboot.xyz.lkrn
        - netboot.xyz.efi
        - grubnetx64-http.efi
        - pxelinux.cfg/01-52-54-00-12-34-56
        - "grub/host-52:54:00:12:34:56.cfg"
        - preseed/preseed-debian.cfg
        - status.html
      loop_control:
        label: "{{ item }}"

    - name: Check that the web server serves the boot tree over HTTP
      ansible.builtin.uri:
        url: "http://127.0.0.1/{{ item }}"
        status_code: 200
      loop:
        - preseed/preseed-debian.cfg
        - status.html
