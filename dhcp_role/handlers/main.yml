---
# Restart synchronously so a failed restart fails the play instead of being
# silently swallowed.
- name: Restart Kea DHCPv4
  ansible.builtin.systemd:
    name: kea-dhcp4-server
    state: restarted

- name: Restart Kea DHCPv6
  ansible.builtin.systemd:
    name: kea-dhcp6-server
    state: restarted
