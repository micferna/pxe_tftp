---
# Kea replaces isc-dhcp-server, which is end-of-life upstream and absent from
# Debian 13 (trixie). Kea is available on both Debian 12 and 13.
- name: Install Kea DHCP server packages
  ansible.builtin.apt:
    name:
      - kea-dhcp4-server
      - kea-dhcp6-server
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Configure Kea DHCPv4
  ansible.builtin.template:
    src: kea-dhcp4.conf.j2
    dest: /etc/kea/kea-dhcp4.conf
    owner: root
    group: root
    mode: "0644"
    validate: "/usr/sbin/kea-dhcp4 -t %s"
  notify: Restart Kea DHCPv4

- name: Ensure Kea DHCPv4 service is enabled and running
  ansible.builtin.systemd:
    name: kea-dhcp4-server
    enabled: true
    state: started

- name: Configure Kea DHCPv6
  ansible.builtin.template:
    src: kea-dhcp6.conf.j2
    dest: /etc/kea/kea-dhcp6.conf
    owner: root
    group: root
    mode: "0644"
    validate: "/usr/sbin/kea-dhcp6 -t %s"
  notify: Restart Kea DHCPv6
  when:
    - dhcp_manage_ipv6 | bool
    - ansible_default_ipv6.interface is defined

- name: Manage the Kea DHCPv6 service
  ansible.builtin.systemd:
    name: kea-dhcp6-server
    enabled: "{{ dhcp_v6_active }}"
    state: "{{ 'started' if dhcp_v6_active else 'stopped' }}"
  vars:
    dhcp_v6_active: "{{ (dhcp_manage_ipv6 | bool) and (ansible_default_ipv6.interface is defined) }}"
