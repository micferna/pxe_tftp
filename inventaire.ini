[pxe_servers]
# Replace the address and credentials with your PXE server's.
# Prefer a non-root user with passwordless sudo over a direct root login, e.g.:
#   192.168.1.14 ansible_user=deploy ansible_ssh_private_key_file=~/.ssh/id_ed25519
# The playbook escalates privileges itself (become: true).
192.168.1.14 ansible_host=192.168.1.14 ansible_user=root ansible_ssh_private_key_file=/home/USER/.ssh/id_rsa
